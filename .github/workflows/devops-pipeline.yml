name: K8s DevOps Pipeline  # The name of your Rocket

on:
  push:
    branches: [ "main" ]  # Trigger: Run every time you push to main

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # The "Racing Frame" for Rocket

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: appdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # --- 0. Get the Code ---
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1. Testing Spring Boot ---
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run JUnit & Mockito
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw test

      # --- 2. Testing the "Face" (Angular) ---
      - name: Run Vitest
        run: |
          cd frontend
          npm install
          npm test -- --watch=false

      # --- 3. Security Check (Snyk CLI) ---
      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      # --- 3a. Security Check: Frontend (Node) ---
      - name: Snyk Frontend Scan
        run: snyk test --file=frontend/package.json --severity-threshold=critical
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # --- 3b. Security Check: Backend (Maven) ---
      - name: Snyk Backend Scan
        continue-on-error: true  # Never use this in production! Just for demo purposes.
        run: snyk test --file=backend/pom.xml --severity-threshold=critical
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # --- 4. Build & Push Docker Images ---
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Images
        run: |
          docker compose build

      - name: Push Docker Images
        run: |
          docker tag k8s-devops-pipeline-backend ghcr.io/${{ github.repository_owner }}/k8s-devops-pipeline-backend:latest
          docker tag k8s-devops-pipeline-frontend ghcr.io/${{ github.repository_owner }}/k8s-devops-pipeline-frontend:latest
          docker push ghcr.io/${{ github.repository_owner }}/k8s-devops-pipeline-backend:latest
          docker push ghcr.io/${{ github.repository_owner }}/k8s-devops-pipeline-frontend:latest