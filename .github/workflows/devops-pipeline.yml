name: K8s DevOps Pipeline  # The name of your Rocket

on:
  push:
    branches: [ "main" ]  # Trigger: Run every time you push to main

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # The "Racing Frame" for Rocket
    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: appdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # --- 0. Get the Code ---
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1. Testing Spring Boot ---
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run JUnit & Mockito
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw test

      # --- 2. Testing the "Face" (Angular) ---
      - name: Run Vitest
        run: |
          cd frontend
          npm install
          npm test -- --watch=false

      # --- 3. Security Check (Snyk CLI) ---
      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      # --- 3a. Security Check: Frontend (Node) ---
      - name: Snyk Frontend Scan
        run: snyk test --file=frontend/package.json --severity-threshold=critical
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # --- 3b. Security Check: Backend (Maven) ---
      - name: Snyk Backend Scan
        continue-on-error: true  # Never use this in production! Just for demo purposes.
        run: snyk test --file=backend/pom.xml --severity-threshold=critical
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # --- 4. Build & Push Docker Images ---
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Images
        run: |
          docker compose build

      - name: Push Docker Images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker tag k8s-devops-pipeline-backend ghcr.io/${OWNER}/k8s-devops-pipeline-backend:latest
          docker tag k8s-devops-pipeline-frontend ghcr.io/${OWNER}/k8s-devops-pipeline-frontend:latest
          docker push ghcr.io/${OWNER}/k8s-devops-pipeline-backend:latest
          docker push ghcr.io/${OWNER}/k8s-devops-pipeline-frontend:latest

  deploy-qa:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 5. Deploy to GKE (QA) ---
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Connect to GKE cluster
        run: gcloud container clusters get-credentials k8s-devops-cluster --region us-central1 --project k8s-devops-pipeline

      - name: Create image pull secret
        run: |
          kubectl delete secret ghcr-secret --ignore-not-found
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.repository_owner }} \
            --docker-password=${{ secrets.GHCR_PAT }}

      - name: Deploy to Kubernetes
        run: kubectl apply -f k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s
          kubectl rollout status deployment/db --timeout=120s

  cypress-e2e:
    runs-on: ubuntu-latest
    needs: deploy-qa

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 6. Get frontend external IP ---
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Connect to GKE cluster
        run: gcloud container clusters get-credentials k8s-devops-cluster --region us-central1 --project k8s-devops-pipeline

      - name: Get frontend IP
        id: get-ip
        run: |
          IP=$(kubectl get service frontend -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "FRONTEND_URL=http://${IP}" >> $GITHUB_OUTPUT

      # --- 7. Run Cypress E2E Tests ---
      - name: Run Cypress E2E
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          config: baseUrl=${{ steps.get-ip.outputs.FRONTEND_URL }}
