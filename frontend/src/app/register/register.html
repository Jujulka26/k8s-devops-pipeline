<div class="page">
  <div class="card">
    <h2>Register</h2>
    @if (error) {
      <p class="error">{{ error }}</p>
    }
    @if (success) {
      <p class="success">{{ success }}</p>
    }
    <form (ngSubmit)="onRegister()">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" [(ngModel)]="name" name="name" placeholder="Enter your name" required />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Registering...' : 'Register' }}
      </button>
    </form>
    <p class="link-text">Already have an account? <a routerLink="/login">Login</a></p>
  </div>
</div>
