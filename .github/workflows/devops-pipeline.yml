name: K8s DevOps Pipeline  # The name of your Rocket

on:
  push:
    branches: [ "main" ]  # Trigger: Run every time you push to main

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # The "Racing Frame" for Rocket

    steps:
      # --- 0. Get the Code ---
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1. Testing Spring Boot ---
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run JUnit & Mockito
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw test

      # --- 2. Testing the "Face" (Angular) ---
      - name: Run Vitest
        run: |
          cd frontend
          npm install
          npm test -- --watch=false

      # --- 3. Security Check (Snyk CLI) ---
      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      # --- 3a. Security Check: Frontend (Node) ---
      - name: Snyk Frontend Scan
        run: snyk test --file=frontend/package.json --severity-threshold=critical
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # --- 3b. Security Check: Backend (Maven) ---
      - name: Snyk Backend Scan
        run: snyk test --file=backend/pom.xml --severity-threshold=critical
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # --- 4. Build the Docker Image ---
      #- name: Build Docker Images
      #  run: |
      #    docker compose build