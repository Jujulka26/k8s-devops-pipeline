name: K8s DevOps Pipeline  # The name of your Rocket

on:
  push:
    branches: [ "main" ]  # Trigger: Run every time you push to main

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # The "Racing Frame" we talked about

    steps:
      # --- 0. Get the Code ---
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1. Testing the "Brain" (Spring Boot) ---
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run JUnit & Mockito
        run: |
          cd spring-boot-server
          chmod +x mvnw
          ./mvnw test

      # --- 2. Testing the "Face" (Angular) ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Jasmine & Karma
        run: |
          cd angular-15-client
          npm install
          npm test -- --watch=false --browsers=ChromeHeadless

      # --- 3. Security Check (Snyk) ---
      # --- 3a. Security Check: Frontend (Node) ---
      - name: Snyk Frontend Scan
        continue-on-error: true  # Don't fail the pipeline if vulnerabilities are found
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=angular-15-client/package.json

      # --- 3b. Security Check: Backend (Maven) ---
      - name: Snyk Backend Scan
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=spring-boot-server/pom.xml --severity-threshold=critical

      # --- 4. Build the Docker Image ---
      #- name: Build Docker Images
      #  run: |
      #    docker compose build