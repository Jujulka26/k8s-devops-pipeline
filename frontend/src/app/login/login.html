<div class="page">
  <div class="card">
    <h2>Login</h2>
    @if (error) {
      <p class="error">{{ error }}</p>
    }
    <form (ngSubmit)="onLogin()">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>
    <p class="link-text">Don't have an account? <a routerLink="/register">Register</a></p>
  </div>
</div>
